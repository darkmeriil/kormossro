<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Page</title>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#f4f4f2;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;max-width:400px;box-shadow:0 2px 24px rgba(0,0,0,.08)}
  .dot{width:48px;height:48px;background:#2d6a4f;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
  .dot svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  h1{font-size:22px;font-weight:700;color:#111;margin:0 0 8px}
  p{font-size:15px;color:#666;margin:0 0 24px;line-height:1.6}
  .badge{display:inline-block;background:#d8f3dc;color:#2d6a4f;font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px}
</style>
</head>
<body>
<div class="card">
  <div class="dot">
    <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
  </div>
  <h1>Deployment works!</h1>
  <p>If you can see this page, your hosting is set up correctly and the domain is pointing properly.</p>
  <span class="badge">✓ Live</span>
</div>
</body>
</html>
